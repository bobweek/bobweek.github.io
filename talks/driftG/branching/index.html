<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Branching diffusion</title>
  <style>
    /* ---- the minimal window ---- */
    #sim {
      position: relative;        /* controls inside are positioned relative to this box */
      width: 800px;              /* must match createCanvas(cw, ch) in sketch.js */
      height: 500px;
      margin: 1rem auto;         /* centered; change/remove to place it elsewhere */
      background: #fff;
      overflow: hidden;          /* clip the control panel to the window */
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 18px rgba(0,0,0,.12);
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    #sim canvas { display: block; }

    /* compact light-theme controls inside the window */
    #sim input[type=range] { margin: 0; height: 14px; }
    #sim button {
      background: #f4f4f4; color: #111; border: 1px solid #bbb;
      border-radius: 4px; line-height: 18px; cursor: pointer;
    }
    #sim button:hover { background: #e8e8e8; }

    /* neutral backdrop; delete when embedding into your own layout */
    body { margin: 0; background: #fafafa; }
  </style>
</head>
<body>
  <!-- the simulation renders entirely inside this box -->
  <div id="sim"></div>

  <!-- p5.js engine, pinned to the 1.x line (this sketch uses 1.x global-mode APIs) -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>

  <!-- the sketch -->
  <script src="sketch.js"></script>
</body>
</html>
